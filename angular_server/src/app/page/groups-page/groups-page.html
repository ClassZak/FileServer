<app-app-header [isAdmin]="isAdmin"></app-app-header>
<main class="MainContent">
	@if (isLoading){
		<app-loading-spinner [title]="'Загрузка'"></app-loading-spinner>
	} @else {
		<h1>Все группы</h1>
		<div class="add-user-container">
			<button
				(click)="setIsCreateGroupModalComponentOpen(true)"
				class="btn btn-green"
			>
				Создать группу
			</button>
		</div>
		@if (error) {
			<div class="error-message">{{ error }}</div>
		}
		<div class="model-table-container">
			<app-model-table
				[modelTableDataObject]="currentGroupModelTableDataObject"
			>
			</app-model-table>
		</div>
	}
</main>
<app-footer></app-footer>

<app-create-group-modal
	[isOpen]="isCreateGroupModalComponentOpen"
	(onClose)="setIsCreateGroupModalComponentOpen(false)"
	(onConfirm)="handleConfirmCreateGroup($event)"
	[users]="users"
>
</app-create-group-modal>
